<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Window | English Therapy</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
    <!-- font-awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- DasiyUi and tailwind Css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body class="">
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="dropdown lg:hidden">
          <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h7"
              />
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
          >
            <li>
              <a href=""><i class="fa-solid fa-circle-question"></i>FAQ</a>
            </li>
            <li>
              <a href=""><i class="fa-solid fa-book-open"></i>Learn</a>
            </li>
            <li>
              <a href=""
                ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
              >
            </li>
          </ul>
        </div>
        <div class="navbar-start">
          <a href="" class="flex items-center gap-1">
            <span class="font-bold text-lg">English</span>
            <img class="" src="./assets/logo.png" alt="" />
            <span class="font-bangla text-lg font-semibold">জানালা</span>
          </a>
        </div>

        <div class="navbar-end lg:flex hidden">
          <ul class="menu menu-horizontal space-x-4">
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-circle-question"></i>FAQ</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-book-open"></i>Learn</a
              >
            </li>
            <li>
              <a href="" class="btn btn-outline btn-primary"
                ><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    <!-- section Banner  -->
    <section
      class="flex flex-col-reverse md:flex-row gap-10 justify-between items-center py-5 w-11/12 mx-auto"
    >
      <div class="contant flex-1 text-center md:text-left">
        <h2 class="text-5xl mb-8 font-bold">
          <span class="text-sky-500">English</span> is Easy!!
        </h2>
        <p class="font-bangla">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ
        </p>
        <fieldset class="fieldset rounded-box w-xs mt-5 space-y-3 items-c">
          <input type="name" class="input" placeholder="Enter Your Name" />

          <input type="password" class="input" placeholder="Password" />

          <button class="btn btn-primary w-2/4">Get Started</button>
        </fieldset>
      </div>

      <div class="image flex-1">
        <img src=".//assets/hero-student.png" alt="" />
      </div>
    </section>

    <!-- section Let's Learn Vocabularies -->
    <section>
      <h1 class="font-bold text-4xl mb-8 text-center">
        <span class="text-sky-500">Let's </span>Learn Vocabularies
      </h1>
      <div
        id="level-container"
        class="flex gap-5 mx-auto flex-wrap justify-center"
      ></div>
    </section>
    <script src="script/script.js"></script>
  </body>
</html>
